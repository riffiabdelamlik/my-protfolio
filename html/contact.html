<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Riffi Abdelamlik</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>
  <div data-include="includes/header.html"></div>

  <main class="container" style="padding:6rem 0 3rem;">
    <h1>Contact</h1>
    <p>If you'd like to work together, send a message using the form below.</p>
    <form action="#" method="post" style="max-width:560px;display:grid;gap:0.75rem;">
      <label class="visually-hidden" for="name">Name</label>
      <input id="name" class="input" type="text" placeholder="Your name">
      <label class="visually-hidden" for="email">Email</label>
      <input id="email" class="input" type="email" placeholder="you@example.com">
      <label class="visually-hidden" for="message">Message</label>
      <textarea id="message" class="input" rows="6" placeholder="Tell me about your project"></textarea>
      <button class="btn btn-primary" type="submit" > <a href="https://chatgpt.com/"></a> Send Message</button>
    </form>
  </main>

  <div data-include="includes/footer.html"></div>
  <script src="includes/include.js"></script>

  <script>
    // contact form handler: client-side mock
    (function(){
      var form = document.querySelector('form');
      if(!form) return;
      form.addEventListener('submit', function(e){
        e.preventDefault();
        var name = document.getElementById('name').value.trim();
        var email = document.getElementById('email').value.trim();
        var msg = document.getElementById('message').value.trim();
        if(!email || !msg){
          alert('Please provide an email and a message.');
          return;
        }
        // Mock submit
        form.reset();
        alert('Thanks, your message was sent (mock). I will reply shortly.');
      });
    })();
  </script>
</body>
</html>
